<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo App</title>
    <style>
        :root {
            --bg-gradient-start: #667eea;
            --bg-gradient-end: #764ba2;
            --card-bg: #ffffff;
            --card-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
            --text-primary: #2d3748;
            --text-secondary: #718096;
            --text-muted: #a0aec0;
            --input-bg: #f7f8fc;
            --input-border: #e2e8f0;
            --input-focus-border: #667eea;
            --task-bg: #f7f8fc;
            --task-hover-bg: #eef0fb;
            --task-hover-border: #667eea;
            --task-done-bg: #f0fff4;
            --task-done-border: #68d391;
            --task-done-text: #a0aec0;
            --filter-bar-bg: #f0f2ff;
            --filter-btn-active-bg: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --filter-btn-active-color: #ffffff;
            --filter-btn-color: #667eea;
            --stats-color: #718096;
            --divider: #e2e8f0;
            --delete-bg: #fff5f5;
            --delete-color: #fc8181;
            --delete-hover-bg: #fc8181;
            --delete-hover-color: #ffffff;
            --clear-color: #e53e3e;
            --clear-hover: #c53030;
            --theme-toggle-bg: #edf2f7;
            --theme-toggle-color: #4a5568;
            --priority-high: #fc8181;
            --priority-medium: #f6ad55;
            --priority-low: #68d391;
            --badge-bg: rgba(102,126,234,0.12);
            --badge-color: #667eea;
        }

        [data-theme="dark"] {
            --bg-gradient-start: #1a1a2e;
            --bg-gradient-end: #16213e;
            --card-bg: #1e2235;
            --card-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            --text-primary: #e2e8f0;
            --text-secondary: #a0aec0;
            --text-muted: #718096;
            --input-bg: #2d3454;
            --input-border: #3d4a6b;
            --input-focus-border: #7c8cf8;
            --task-bg: #252d47;
            --task-hover-bg: #2d3660;
            --task-hover-border: #7c8cf8;
            --task-done-bg: #1c2e22;
            --task-done-border: #48bb78;
            --task-done-text: #718096;
            --filter-bar-bg: #252d47;
            --filter-btn-active-bg: linear-gradient(135deg, #7c8cf8 0%, #a78bfa 100%);
            --filter-btn-active-color: #ffffff;
            --filter-btn-color: #a0aec0;
            --stats-color: #a0aec0;
            --divider: #2d3454;
            --delete-bg: #2d2030;
            --delete-color: #fc8181;
            --delete-hover-bg: #9b2c2c;
            --delete-hover-color: #ffffff;
            --clear-color: #fc8181;
            --clear-hover: #feb2b2;
            --theme-toggle-bg: #252d47;
            --theme-toggle-color: #e2e8f0;
            --priority-high: #fc8181;
            --priority-medium: #f6ad55;
            --priority-low: #68d391;
            --badge-bg: rgba(124,140,248,0.15);
            --badge-color: #a0aec0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%);
            min-height: 100vh;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            transition: background 0.3s ease;
        }

        .container {
            background: var(--card-bg);
            border-radius: 24px;
            box-shadow: var(--card-shadow);
            padding: 36px 40px 40px;
            max-width: 620px;
            width: 100%;
            transition: background 0.3s ease, box-shadow 0.3s ease;
        }

        /* ── Header ── */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 28px;
        }

        h1 {
            font-size: 2em;
            font-weight: 800;
            background: linear-gradient(135deg, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.5px;
        }

        .theme-toggle {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--theme-toggle-bg);
            color: var(--theme-toggle-color);
            border: none;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            flex-shrink: 0;
        }

        .theme-toggle:hover {
            transform: rotate(20deg) scale(1.1);
        }

        /* ── Input section ── */
        .input-section {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .input-wrapper {
            flex: 1;
            position: relative;
        }

        #taskInput {
            width: 100%;
            padding: 14px 18px;
            background: var(--input-bg);
            border: 2px solid var(--input-border);
            border-radius: 14px;
            font-size: 15px;
            color: var(--text-primary);
            transition: all 0.3s ease;
            outline: none;
        }

        #taskInput::placeholder {
            color: var(--text-muted);
        }

        #taskInput:focus {
            border-color: var(--input-focus-border);
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.15);
            background: var(--card-bg);
        }

        .priority-select {
            padding: 14px 10px;
            background: var(--input-bg);
            border: 2px solid var(--input-border);
            border-radius: 14px;
            font-size: 13px;
            color: var(--text-secondary);
            cursor: pointer;
            outline: none;
            transition: all 0.3s ease;
        }

        .priority-select:focus {
            border-color: var(--input-focus-border);
        }

        #addTask {
            padding: 14px 26px;
            background: linear-gradient(135deg, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
            white-space: nowrap;
        }

        #addTask:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(102, 126, 234, 0.55);
        }

        #addTask:active {
            transform: translateY(0);
        }

        /* ── Filter tabs ── */
        .filter-bar {
            display: flex;
            gap: 6px;
            background: var(--filter-bar-bg);
            border-radius: 14px;
            padding: 5px;
            margin-bottom: 20px;
        }

        .filter-btn {
            flex: 1;
            padding: 9px 12px;
            border: none;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            background: transparent;
            color: var(--filter-btn-color);
            transition: all 0.25s ease;
        }

        .filter-btn.active {
            background: linear-gradient(135deg, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%);
            color: white;
            box-shadow: 0 2px 10px rgba(102, 126, 234, 0.35);
        }

        .filter-btn:not(.active):hover {
            background: rgba(102, 126, 234, 0.08);
        }

        /* ── Stats bar ── */
        .stats-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 4px;
            margin-bottom: 14px;
            border-bottom: 1px solid var(--divider);
        }

        .stats-text {
            font-size: 13px;
            color: var(--stats-color);
            font-weight: 500;
        }

        .stats-badges {
            display: flex;
            gap: 8px;
        }

        .badge {
            font-size: 11px;
            font-weight: 700;
            padding: 3px 9px;
            border-radius: 20px;
            background: var(--badge-bg);
            color: var(--badge-color);
        }

        .clear-btn {
            font-size: 12px;
            font-weight: 600;
            color: var(--clear-color);
            background: none;
            border: none;
            cursor: pointer;
            padding: 2px 4px;
            border-radius: 6px;
            transition: all 0.2s ease;
        }

        .clear-btn:hover {
            color: var(--clear-hover);
            text-decoration: underline;
        }

        /* ── Task list ── */
        #taskList {
            list-style: none;
            min-height: 20px;
        }

        .task {
            display: flex;
            align-items: center;
            padding: 14px 16px;
            margin: 8px 0;
            background: var(--task-bg);
            border-radius: 14px;
            transition: all 0.3s ease;
            border: 2px solid transparent;
            gap: 12px;
        }

        .task:hover {
            background: var(--task-hover-bg);
            border-color: var(--task-hover-border);
            transform: translateX(4px);
        }

        .task.completed {
            background: var(--task-done-bg);
            border-color: var(--task-done-border);
            opacity: 0.85;
        }

        .task.completed .task-text {
            text-decoration: line-through;
            color: var(--task-done-text);
        }

        /* Custom checkbox */
        .task-checkbox {
            appearance: none;
            -webkit-appearance: none;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            border: 2.5px solid var(--input-border);
            cursor: pointer;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.25s ease;
            background: var(--card-bg);
            position: relative;
        }

        .task-checkbox:checked {
            background: linear-gradient(135deg, #48bb78 0%, #38a169 100%);
            border-color: #48bb78;
        }

        .task-checkbox:checked::after {
            content: '';
            display: block;
            width: 5px;
            height: 9px;
            border: 2px solid white;
            border-top: none;
            border-left: none;
            transform: rotate(45deg) translate(-1px, -1px);
            position: absolute;
        }

        .task-checkbox:hover:not(:checked) {
            border-color: var(--bg-gradient-start);
        }

        /* Priority dot */
        .priority-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .priority-dot.high   { background: var(--priority-high); }
        .priority-dot.medium { background: var(--priority-medium); }
        .priority-dot.low    { background: var(--priority-low); }

        .task-text {
            flex: 1;
            font-size: 15px;
            color: var(--text-primary);
            transition: all 0.3s ease;
            word-break: break-word;
            line-height: 1.4;
        }

        .task-meta {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }

        .task-time {
            font-size: 11px;
            color: var(--text-muted);
        }

        .delete-btn {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--delete-bg);
            color: var(--delete-color);
            border: none;
            border-radius: 8px;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.25s ease;
            flex-shrink: 0;
            line-height: 1;
        }

        .delete-btn:hover {
            background: var(--delete-hover-bg);
            color: var(--delete-hover-color);
            transform: scale(1.1);
        }

        .delete-btn:active {
            transform: scale(0.95);
        }

        /* ── Empty state ── */
        .empty-state {
            text-align: center;
            padding: 48px 20px 36px;
        }

        .empty-icon {
            font-size: 52px;
            margin-bottom: 14px;
            display: block;
            animation: float 3s ease-in-out infinite;
        }

        .empty-title {
            font-size: 17px;
            font-weight: 700;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }

        .empty-subtitle {
            font-size: 13px;
            color: var(--text-muted);
        }

        /* ── Progress bar ── */
        .progress-wrapper {
            margin-bottom: 16px;
        }

        .progress-label {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 6px;
        }

        .progress-bar-track {
            height: 6px;
            background: var(--filter-bar-bg);
            border-radius: 99px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #68d391, #38a169);
            border-radius: 99px;
            transition: width 0.4s ease;
        }

        /* ── Animations ── */
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-12px) scale(0.97); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        @keyframes slideOut {
            from { opacity: 1; transform: translateX(0); max-height: 80px; }
            to   { opacity: 0; transform: translateX(30px); max-height: 0; padding: 0; margin: 0; }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50%       { transform: translateY(-8px); }
        }

        .task { animation: slideIn 0.3s ease; }

        /* ── Responsive ── */
        @media (max-width: 480px) {
            .container { padding: 24px 20px 28px; }
            h1 { font-size: 1.6em; }
            .input-section { flex-wrap: wrap; }
            #addTask { width: 100%; }
            .priority-select { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>✅ My Tasks</h1>
            <button class="theme-toggle" id="themeToggle" title="Toggle dark mode">🌙</button>
        </div>

        <!-- Input -->
        <div class="input-section">
            <input type="text" id="taskInput" placeholder="Add a new task…">
            <select class="priority-select" id="prioritySelect" title="Priority">
                <option value="high">🔴 High</option>
                <option value="medium">🟡 Mid</option>
                <option value="low">🟢 Low</option>
            </select>
            <button id="addTask">+ Add</button>
        </div>

        <!-- Filter tabs -->
        <div class="filter-bar">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="active">Active</button>
            <button class="filter-btn" data-filter="completed">Done</button>
        </div>

        <!-- Progress -->
        <div class="progress-wrapper" id="progressWrapper" style="display:none">
            <div class="progress-label">
                <span id="progressLabel">0 of 0 done</span>
                <span id="progressPct">0%</span>
            </div>
            <div class="progress-bar-track">
                <div class="progress-bar-fill" id="progressFill" style="width:0%"></div>
            </div>
        </div>

        <!-- Stats bar -->
        <div class="stats-bar" id="statsBar" style="display:none">
            <span class="stats-text" id="statsText">0 tasks remaining</span>
            <div style="display:flex;align-items:center;gap:10px">
                <div class="stats-badges">
                    <span class="badge" id="badgeAll" title="Total">0</span>
                </div>
                <button class="clear-btn" id="clearCompleted">Clear done</button>
            </div>
        </div>

        <!-- Task list -->
        <ul id="taskList"></ul>
    </div>

    <script>
        // ── State ──────────────────────────────────────────────────────────────
        let tasks = JSON.parse(localStorage.getItem('tasks') || '[]');
        let currentFilter = 'all';

        // ── DOM refs ───────────────────────────────────────────────────────────
        const taskInput      = document.getElementById('taskInput');
        const addTaskButton  = document.getElementById('addTask');
        const taskList       = document.getElementById('taskList');
        const prioritySelect = document.getElementById('prioritySelect');
        const themeToggle    = document.getElementById('themeToggle');
        const clearCompleted = document.getElementById('clearCompleted');
        const statsBar       = document.getElementById('statsBar');
        const statsText      = document.getElementById('statsText');
        const badgeAll       = document.getElementById('badgeAll');
        const progressWrapper = document.getElementById('progressWrapper');
        const progressFill   = document.getElementById('progressFill');
        const progressLabel  = document.getElementById('progressLabel');
        const progressPct    = document.getElementById('progressPct');

        // ── Dark mode ──────────────────────────────────────────────────────────
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
        themeToggle.textContent = savedTheme === 'dark' ? '☀️' : '🌙';

        themeToggle.addEventListener('click', () => {
            const current = document.documentElement.getAttribute('data-theme');
            const next = current === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);
            themeToggle.textContent = next === 'dark' ? '☀️' : '🌙';
        });

        // ── Filters ────────────────────────────────────────────────────────────
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.dataset.filter;
                render();
            });
        });

        // ── Add task ───────────────────────────────────────────────────────────
        addTaskButton.addEventListener('click', addTask);
        taskInput.addEventListener('keypress', e => { if (e.key === 'Enter') addTask(); });

        function addTask() {
            const text = taskInput.value.trim();
            if (!text) {
                taskInput.focus();
                taskInput.style.borderColor = 'var(--priority-high)';
                setTimeout(() => { taskInput.style.borderColor = ''; }, 800);
                return;
            }
            tasks.unshift({
                id: Date.now(),
                text,
                completed: false,
                priority: prioritySelect.value,
                createdAt: new Date().toLocaleDateString([], { month: 'short', day: 'numeric' }) + ' ' + new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
            });
            taskInput.value = '';
            save();
            render();
        }

        // ── Clear completed ────────────────────────────────────────────────────
        clearCompleted.addEventListener('click', () => {
            tasks = tasks.filter(t => !t.completed);
            save();
            render();
        });

        // ── Toggle complete ────────────────────────────────────────────────────
        function toggleTask(id) {
            const t = tasks.find(t => t.id === id);
            if (t) t.completed = !t.completed;
            save();
            render();
        }

        // ── Delete task ────────────────────────────────────────────────────────
        function deleteTask(id) {
            tasks = tasks.filter(t => t.id !== id);
            save();
            render();
        }

        // ── Persist ────────────────────────────────────────────────────────────
        function save() {
            localStorage.setItem('tasks', JSON.stringify(tasks));
        }

        // ── Render ─────────────────────────────────────────────────────────────
        function render() {
            const total     = tasks.length;
            const done      = tasks.filter(t => t.completed).length;
            const remaining = total - done;
            const pct       = total ? Math.round((done / total) * 100) : 0;

            // Stats
            statsBar.style.display      = total ? 'flex' : 'none';
            progressWrapper.style.display = total ? 'block' : 'none';
            statsText.textContent       = `${remaining} task${remaining !== 1 ? 's' : ''} remaining`;
            badgeAll.textContent        = total;
            progressFill.style.width    = pct + '%';
            progressLabel.textContent   = `${done} of ${total} done`;
            progressPct.textContent     = pct + '%';

            // Filter
            let visible = tasks;
            if (currentFilter === 'active')    visible = tasks.filter(t => !t.completed);
            if (currentFilter === 'completed') visible = tasks.filter(t =>  t.completed);

            taskList.innerHTML = '';

            if (visible.length === 0) {
                const msgs = {
                    all:       { icon: '📋', title: 'No tasks yet', sub: 'Add your first task above!' },
                    active:    { icon: '🎉', title: 'All done!', sub: 'Nothing left to do.' },
                    completed: { icon: '🌱', title: 'No completed tasks', sub: 'Get to work!' }
                };
                const m = msgs[currentFilter];
                taskList.innerHTML = `
                    <div class="empty-state">
                        <span class="empty-icon">${m.icon}</span>
                        <div class="empty-title">${m.title}</div>
                        <div class="empty-subtitle">${m.sub}</div>
                    </div>`;
                return;
            }

            visible.forEach(task => {
                const li = document.createElement('li');
                li.className = 'task' + (task.completed ? ' completed' : '');

                const checkbox = document.createElement('input');
                checkbox.type = 'checkbox';
                checkbox.className = 'task-checkbox';
                checkbox.checked = task.completed;
                checkbox.addEventListener('change', () => toggleTask(task.id));

                const dot = document.createElement('span');
                dot.className = `priority-dot ${task.priority}`;

                const span = document.createElement('span');
                span.className = 'task-text';
                span.textContent = task.text;

                const meta = document.createElement('div');
                meta.className = 'task-meta';

                const time = document.createElement('span');
                time.className = 'task-time';
                time.textContent = task.createdAt;

                const delBtn = document.createElement('button');
                delBtn.className = 'delete-btn';
                delBtn.innerHTML = '🗑';
                delBtn.title = 'Delete';
                delBtn.addEventListener('click', () => deleteTask(task.id));

                meta.appendChild(time);
                meta.appendChild(delBtn);

                li.appendChild(checkbox);
                li.appendChild(dot);
                li.appendChild(span);
                li.appendChild(meta);

                taskList.appendChild(li);
            });
        }

        // ── Boot ───────────────────────────────────────────────────────────────
        render();
    </script>
</body>
</html>
